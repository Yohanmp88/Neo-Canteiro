name: Corrigir alerta automático de compras

on:
  push:
    paths:
      - '.github/workflows/patch-automatic-purchase-alert.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/patch-automatic-purchase-alert.cjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/operationalData.js
          git commit -m "Calcula atraso de compra pela data prevista"
          git push
