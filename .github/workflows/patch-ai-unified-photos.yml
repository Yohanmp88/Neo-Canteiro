name: Corrigir fotos da IA definitivamente

on:
  push:
    paths:
      - '.github/workflows/patch-ai-unified-photos.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/patch-ai-unified-photos.cjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/platform/AIWorkspace.js
          git commit -m "Busca fotos atualizadas antes de responder na IA"
          git push
