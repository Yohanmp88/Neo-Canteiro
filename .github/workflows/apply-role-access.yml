name: Apply role access

on:
  push:
    paths:
      - '.github/workflows/apply-role-access.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply login-based access
        shell: python
        run: |
          from pathlib import Path

          def replace_once(text, old, new, label):
              if old not in text:
                  raise SystemExit(f'Expected block not found: {label}')
              return text.replace(old, new, 1)

          page_path = Path('src/app/page.js')
          page = page_path.read_text(encoding='utf-8')

          page = replace_once(
              page,
              "import { useEquipe } from '@/hooks/useEquipe'\n",
              "import { useEquipe } from '@/hooks/useEquipe'\nimport { canEditModule, canViewModule, normalizeRole } from '@/lib/accessControl'\n",
              'page access import',
          )

          page = replace_once(
              page,
              "  const [perfilAtivo, setPerfilAtivo] = useState(null)\n  const [inicializandoPerfil, setInicializandoPerfil] = useState(true)\n",
              "",
              'profile selector states',
          )

          page = replace_once(
              page,
              "  const permissaoEditar = ['engenheiro', 'estagiario'].includes(perfilAtivo)\n  const permissaoAdmin = perfilAtivo === 'engenheiro'\n  const ehCliente = perfilAtivo === 'cliente'\n\n  // --- EFEITOS DE INICIALIZAÇÃO ---\n  useEffect(() => {\n    const init = async () => {\n      try {\n        if (!user) { setPerfilAtivo(null); return }\n        // Para investidor/demo, forçar sempre a escolha do perfil ao iniciar\n        // Não carregamos automaticamente do localStorage para garantir a tela de escolha\n        setPerfilAtivo(null)\n      } catch (e) { console.error(e) } finally { setInicializandoPerfil(false) }\n    }\n    if (!authLoading) init()\n  }, [user, authLoading])\n",
              "  const isDemoUser = user?.app_metadata?.provider === 'demo'\n  const profileReady = Boolean(userProfile) || isDemoUser\n  const role = normalizeRole(userProfile?.tipo_usuario || userProfile?.role || user?.user_metadata?.role)\n  const permissaoEditar = canEditModule(role, tela)\n  const permissaoAdmin = canEditModule(role, 'obras')\n  const ehCliente = role === 'cliente'\n  const profileForNavigation = {\n    ...userProfile,\n    nome: userProfile?.nome || user?.user_metadata?.nome || user?.email?.split('@')[0] || 'Usuário',\n    role,\n    tipo_usuario: role,\n    tipo: role,\n  }\n\n  // Cada login entra diretamente na experiência autorizada pelo perfil do banco.\n  useEffect(() => {\n    if (!user || !profileReady) return\n    if (!canViewModule(role, tela)) setTela('dashboard')\n  }, [user, profileReady, role, tela])\n",
              'profile selection logic',
          )

          page = replace_once(
              page,
              "  const trocarPerfil = () => {\n    setPerfilAtivo(null)\n  }\n\n",
              "",
              'change profile handler',
          )

          page = replace_once(
              page,
              "    if (!obraAtualId || String(obraAtualId).startsWith('demo')) return\n    const next = { ...diarioLocal, ...updates }",
              "    if (!canEditModule(role, 'diario') || !obraAtualId || String(obraAtualId).startsWith('demo')) return\n    const next = { ...diarioLocal, ...updates }",
              'diary permission',
          )

          page = replace_once(
              page,
              "    if (!files.length || !obraAtualId || String(obraAtualId).startsWith('demo')) return",
              "    if (!canEditModule(role, 'fotos') || !files.length || !obraAtualId || String(obraAtualId).startsWith('demo')) return",
              'photo permission',
          )

          page = replace_once(
              page,
              "  if (authLoading || (user && inicializandoPerfil)) return <Loading text=\"Processando acesso...\" />\n  if (!user) return <LoginScreen login={authLogin} />\n  if (!perfilAtivo) return <PerfilChoiceScreen onSelect={t => setPerfilAtivo(t)} logout={authLogout} />\n",
              "  if (authLoading || (user && !profileReady)) return <Loading text=\"Processando acesso...\" />\n  if (!user) return <LoginScreen login={authLogin} />\n",
              'render profile choice',
          )

          page = replace_once(page, "userProfile={userProfile} logout={authLogout}", "userProfile={profileForNavigation} logout={authLogout}", 'sidebar profile')
          page = replace_once(page, "tipo: perfilAtivo", "tipo: role", 'header profile')
          page = replace_once(
              page,
              "<DashboardView obraAtual={obraAtualSegura} tarefas={tarefas} materiais={materiais} diarios={diarios} isClient={ehCliente} onNavigate={setTela} />",
              "<DashboardView obraAtual={obraAtualSegura} tarefas={tarefas} materiais={materiais} diarios={diarios} user={user} role={role} isClient={ehCliente} onNavigate={setTela} />",
              'dashboard role props',
          )
          page = replace_once(page, "{tela === 'equipe' && !ehCliente &&", "{tela === 'equipe' && canViewModule(role, 'equipe') &&", 'team visibility')
          page = replace_once(page, "{tela === 'diario' && !ehCliente &&", "{tela === 'diario' && canViewModule(role, 'diario') &&", 'diary visibility')
          page = replace_once(page, "{tela === 'fotos' &&", "{tela === 'fotos' && canViewModule(role, 'fotos') &&", 'photo visibility')
          page = replace_once(page, "{tela === 'usuarios' &&", "{tela === 'usuarios' && canViewModule(role, 'usuarios') &&", 'users visibility')
          page = replace_once(page, "{tela === 'compras' &&", "{tela === 'compras' && canViewModule(role, 'compras') &&", 'purchases visibility')
          page = replace_once(page, "<BottomNav activeTab={tela} onTabChange={setTela} />", "<BottomNav activeTab={tela} onTabChange={setTela} userProfile={profileForNavigation} />", 'bottom navigation profile')

          start = page.find("function PerfilChoiceScreen(")
          end = page.find("function LoginScreen(", start)
          if start == -1 or end == -1:
              raise SystemExit('Profile choice component not found')
          page = page[:start] + page[end:]
          page_path.write_text(page, encoding='utf-8')

          dashboard_path = Path('src/components/dashboard/views/DashboardView.js')
          dashboard = dashboard_path.read_text(encoding='utf-8')
          dashboard = replace_once(
              dashboard,
              "import '@/lib/coreModuleDefinitions'\n",
              "import '@/lib/coreModuleDefinitions'\nimport { canViewModule, normalizeRole } from '@/lib/accessControl'\n",
              'dashboard access import',
          )
          dashboard = replace_once(
              dashboard,
              "  user,\n  onNavigate,\n}) {",
              "  user,\n  role,\n  onNavigate,\n}) {",
              'dashboard role prop',
          )
          dashboard = replace_once(
              dashboard,
              "  const [seenVersion, setSeenVersion] = useState(0)\n",
              "  const [seenVersion, setSeenVersion] = useState(0)\n  const activeRole = normalizeRole(role)\n",
              'dashboard active role',
          )
          dashboard = replace_once(
              dashboard,
              "  const navigate = (tabId) => {\n    if (tabId === 'diario' || tabId === 'fotos') markSeen(tabId)",
              "  const navigate = (tabId) => {\n    if (!canViewModule(activeRole, tabId)) return\n    if (tabId === 'diario' || tabId === 'fotos') markSeen(tabId)",
              'dashboard navigation guard',
          )
          dashboard = replace_once(
              dashboard,
              "        <MiniCard title=\"Suprimentos\" value={materiaisAtrasados} detail=\"Materiais em atraso\" icon={ShoppingBag} color={materiaisAtrasados > 0 ? 'orange' : 'slate'} onClick={() => navigate('compras')} />\n        <MiniCard title=\"Diários\" value={diariosVisiveis.length} detail={`${diariosVisiveis.length} registro${diariosVisiveis.length === 1 ? '' : 's'}`} icon={FileText} color=\"blue\" notification={diariosNovos} onClick={() => navigate('diario')} />\n        <MiniCard title=\"Fotos\" value={fotosVisiveis.length} detail={`${fotosVisiveis.length} foto${fotosVisiveis.length === 1 ? '' : 's'}`} icon={Camera} color=\"purple\" notification={fotosNovas} onClick={() => navigate('fotos')} />",
              "        {canViewModule(activeRole, 'compras') && <MiniCard title=\"Suprimentos\" value={materiaisAtrasados} detail=\"Materiais em atraso\" icon={ShoppingBag} color={materiaisAtrasados > 0 ? 'orange' : 'slate'} onClick={() => navigate('compras')} />}\n        {canViewModule(activeRole, 'diario') && <MiniCard title=\"Diários\" value={diariosVisiveis.length} detail={`${diariosVisiveis.length} registro${diariosVisiveis.length === 1 ? '' : 's'}`} icon={FileText} color=\"blue\" notification={diariosNovos} onClick={() => navigate('diario')} />}\n        {canViewModule(activeRole, 'fotos') && <MiniCard title=\"Fotos\" value={fotosVisiveis.length} detail={`${fotosVisiveis.length} foto${fotosVisiveis.length === 1 ? '' : 's'}`} icon={Camera} color=\"purple\" notification={fotosNovas} onClick={() => navigate('fotos')} />}",
              'dashboard module cards',
          )
          dashboard = replace_once(
              dashboard,
              "          <button onClick={() => navigate('diario')} className=\"group relative flex h-[105px] w-full flex-col justify-between overflow-hidden rounded-2xl border border-slate-200/60 bg-white p-3 text-left transition-all hover:border-blue-400 hover:shadow-sm\">",
              "          {canViewModule(activeRole, 'diario') && <button onClick={() => navigate('diario')} className=\"group relative flex h-[105px] w-full flex-col justify-between overflow-hidden rounded-2xl border border-slate-200/60 bg-white p-3 text-left transition-all hover:border-blue-400 hover:shadow-sm\">",
              'dashboard diary quick card open',
          )
          dashboard = replace_once(
              dashboard,
              "          </button>\n\n          <button onClick={() => navigate('fotos')}",
              "          </button>}\n\n          {canViewModule(activeRole, 'fotos') && <button onClick={() => navigate('fotos')}",
              'dashboard diary close and photo open',
          )
          dashboard = replace_once(
              dashboard,
              "          </button>\n        </div>\n      </div>",
              "          </button>}\n        </div>\n      </div>",
              'dashboard photo quick card close',
          )
          dashboard_path.write_text(dashboard, encoding='utf-8')

          workflow = Path('.github/workflows/apply-role-access.yml')
          workflow.unlink()

      - name: Commit changes
        run: |
          git config user.name "NeoCanteiro Bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/app/page.js src/components/dashboard/views/DashboardView.js .github/workflows/apply-role-access.yml
          git commit -m "Remove seletor de perfil e aplica permissões por login"
          git push
