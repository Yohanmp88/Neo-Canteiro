name: Corrigir rota de compras

on:
  push:
    paths:
      - '.github/workflows/patch-purchase-route.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/patch-purchase-route.cjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/page.js
          git commit -m "Abre a Gestão de Compras profissional"
          git push
