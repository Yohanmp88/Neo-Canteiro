name: Ajustar cabeçalho do dashboard

on:
  push:
    paths:
      - '.github/workflows/patch-dashboard-shell.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/patch-dashboard-shell.cjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/page.js
          git commit -m "Compacta cabeçalho e remove espaço vazio do dashboard"
          git push
