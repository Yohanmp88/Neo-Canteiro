name: Integrar Excel e SINAPI

on:
  push:
    paths:
      - '.github/workflows/patch-excel-sinapi-integration.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Aplicar integração
        run: node scripts/patch-excel-sinapi-integration.cjs

      - name: Publicar integração
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/moduleDefinitions.js src/lib/accessControl.js src/components/dashboard/Sidebar.js src/components/dashboard/BottomNav.js src/app/workspace/page.js src/components/platform/SpreadsheetWorkspace.js
          git commit -m "Integra importação Excel e biblioteca SINAPI à plataforma"
          git push
