name: Integrar fotos na IA da obra

on:
  push:
    paths:
      - '.github/workflows/patch-ai-daily-photos.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/patch-ai-daily-photos.cjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/page.js src/components/platform/AIWorkspace.js
          git commit -m "Consulta diário materiais e fotos na IA"
          git push
