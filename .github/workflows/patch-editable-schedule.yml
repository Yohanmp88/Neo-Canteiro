name: Editar cronograma completo

on:
  push:
    paths:
      - '.github/workflows/patch-editable-schedule.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/patch-editable-schedule.cjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/dashboard/Schedule.js
          git commit -m "Permite editar atividade datas e progresso do cronograma"
          git push
