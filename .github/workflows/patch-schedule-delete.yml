name: Adicionar exclusão de atividades

on:
  push:
    paths:
      - '.github/workflows/patch-schedule-delete.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/patch-schedule-delete.cjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/page.js src/components/dashboard/Schedule.js
          git commit -m "Permite excluir atividades do cronograma"
          git push
