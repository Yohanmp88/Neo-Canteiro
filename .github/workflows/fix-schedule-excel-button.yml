name: Corrigir botão Excel do cronograma

on:
  push:
    paths:
      - '.github/workflows/fix-schedule-excel-button.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/fix-schedule-excel-button.cjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/page.js
          git commit -m "Libera exportação Excel do cronograma"
          git push
