name: Importar cronograma Excel

on:
  push:
    paths:
      - '.github/workflows/patch-schedule-excel-import.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/patch-schedule-excel-import.cjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/page.js
          git commit -m "Adiciona upload e tratamento de cronograma Excel"
          git push
